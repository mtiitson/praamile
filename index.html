<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Praamile – Praamiaegade jälgija</title>
  <meta name="description" content="Näed kohe, millal liikuma hakata, et järgmisele praamile jõuda.">
  <meta name="theme-color" content="#eef1f6">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://praamile.ee/">
  <meta property="og:title"       content="Praamile">
  <meta property="og:description" content="Näed kohe, millal liikuma hakata, et järgmisele praamile jõuda.">
  <meta property="og:image"       content="https://praamile.ee/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter / X -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Praamile">
  <meta name="twitter:description" content="Näed kohe, millal startida, et järgmisele praamile jõuda.">
  <meta name="twitter:image"       content="https://praamile.ee/og-image.png">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">

  <!-- Favicon: anchor icon -->
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <style>
    :root {
      --c-bg:    #eef1f6;
      --c-card:  #ffffff;
      --c-navy:  #1e3a5f;
      --c-muted: #8a94a6;
      --c-green: #16a34a;
      --c-yellow:#ca8a04;
      --c-red:   #dc2626;
      --c-blue:  #2563eb;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-size: clamp(16px, 4.5vw, 20px);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--c-bg);
      color: var(--c-navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.75rem 1.25rem 3rem;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 2rem;
    }
    #splash.hidden { display: none; }
    .hidden { display: none !important; }
    #splash-icon { color: var(--c-navy); margin-bottom: 1.25rem; }
    #splash-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--c-navy);
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }
    #splash-desc {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--c-muted);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    #start-btn {
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
      background: var(--c-navy);
      border: none;
      border-radius: 12px;
      padding: 0.75rem 2rem;
      cursor: pointer;
    }

    #status {
      color: var(--c-muted);
      font-size: 1.25rem;
      font-weight: 300;
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #status:empty { display: none; }
    #error {
      color: var(--c-red);
      font-size: 1.25rem;
      font-weight: 300;
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.25rem;
    }
    #error.hidden { display: none; }
    #error-msg { white-space: pre-line; }
    #retry-btn {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--c-muted);
      background: none;
      border: 1px solid #c8d0dc;
      border-radius: 8px;
      padding: 0.5rem 1.25rem;
      cursor: pointer;
    }
    #retry-btn:hover { color: var(--c-navy); border-color: var(--c-navy); }

    #results {
      width: 100%;
      max-width: 480px;
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* ── Port section ── */
    .port-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .port-name-wrap { display: flex; align-items: center; gap: 7px; }
    .port-name  { font-size: 1.1rem; font-weight: 700; color: var(--c-navy); }
    .port-drive { font-size: 0.8rem; color: var(--c-muted); }



    .deps-scroll-wrap { position: relative; }

    .departures {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 330px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .departures.expanded      { max-height: 440px; }
    .departures::-webkit-scrollbar { display: none; }

    .deps-fade-top,
    .deps-fade-bot {
      position: absolute;
      left: 0; right: 0;
      height: 70px;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .deps-fade-top { top: 0;    background: linear-gradient(to bottom, var(--c-bg), transparent); }
    .deps-fade-bot { bottom: 0; background: linear-gradient(to bottom, transparent, var(--c-bg)); }

    /* ── Departure card ── */
    .dep-card {
      background: var(--c-card);
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.06);
      display: flex;
    }

    .dep-strip { width: 5px; flex-shrink: 0; border-radius: 6px 0 0 6px; }
    .dep-strip.green  { background: var(--c-green); }
    .dep-strip.yellow { background: var(--c-yellow); }
    .dep-strip.red    { background: var(--c-red); }
    .dep-strip.grey   { background: var(--c-muted); }

    .dep-body { flex: 1; padding: 14px 16px; }

    .dep-mc-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .micro-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--c-muted);
      margin-bottom: 2px;
    }
    .big-time {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    /* ── Timeline ── */
    .dep-tw {
      position: relative;
      margin-bottom: 24px;
    }
    .dep-tr {
      height: 6px;
      border-radius: 3px;
    }
    .dep-tr.missed { background: #d1d5db; }

    .dep-caret {
      position: absolute;
      right: 0;
      top: -6px;
      width: 2.5px;
      height: 18px;
      background: var(--c-red);
      border-radius: 2px;
      z-index: 4;
    }
    .dep-flag {
      position: absolute;
      top: -11px;
      width: 2px;
      height: 12px;
      background: var(--c-green);
      border-radius: 1px;
      z-index: 3;
      transform: translateX(-50%);
    }
    .dep-flag::after {
      content: '';
      position: absolute;
      top: 0;
      left: 2px;
      width: 0;
      height: 0;
      border-top: 2px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 7px solid var(--c-green);
    }
    .dep-caret.missed-edge {
      right: auto;
      left: 0;
      background: var(--c-muted);
      transform: translateX(-50%);
    }

    .dep-pin {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
      z-index: 5;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }
    .dep-pin.green  { border: 2.5px solid var(--c-green); }
    .dep-pin.yellow { border: 2.5px solid var(--c-yellow); box-shadow: 0 0 0 2px rgba(202,138,4,.15), 0 1px 4px rgba(0,0,0,.2); }
    .dep-pin.red    { border: 2.5px solid var(--c-red);    box-shadow: 0 0 0 2px rgba(220,38,38,.15), 0 1px 4px rgba(0,0,0,.2); }
    .dep-pin.grey   { border: 2.5px solid var(--c-muted); }

    .dep-pin-lbl {
      position: absolute;
      top: 13px;
      font-size: 0.6rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      font-weight: 600;
      transform: translateX(-50%);
    }
    .dep-pin-lbl.green  { color: var(--c-green); }
    .dep-pin-lbl.yellow { color: var(--c-yellow); }
    .dep-pin-lbl.red    { color: var(--c-red); }
    .dep-pin-lbl.grey   { color: var(--c-muted); }

    .dep-countdown {
      font-size: 0.72rem;
      color: var(--c-muted);
      padding-bottom: 4px;
    }

    #bottom-bar {
      width: 100%;
      max-width: 480px;
      margin-top: auto;
      padding-top: 1.25rem;
    }
    #controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .buffer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .buffer-row-label {
      font-size: 0.75rem;
      color: var(--c-muted);
      white-space: nowrap;
    }
    .buffer-opts {
      display: flex;
      gap: 4px;
      flex-wrap: nowrap;
    }
    .buffer-opts input[type=radio] { display: none; }
    .buffer-opts label {
      font-size: 0.75rem;
      font-family: inherit;
      color: var(--c-muted);
      cursor: pointer;
      padding: 3px 9px;
      border-radius: 99px;
      border: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .buffer-opts input[type=radio]:checked + label {
      color: var(--c-navy);
      border-color: var(--c-navy);
    }
    .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--c-muted);
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-family: inherit;
      padding: 4px 0;
      transition: color 0.15s;
    }
    .toggle-btn.active { color: var(--c-navy); }

    .no-deps {
      color: var(--c-muted);
      font-size: 0.875rem;
      font-style: italic;
      padding: 4px 0;
    }

  .location-row {
    font-size: 0.8rem;
    color: var(--c-muted);
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .dep-skeleton {
    height: 70px;
    background: #e5e7eb;
    border-radius: 6px;
    margin-bottom: 6px;
    animation: skel-pulse 1.4s ease-in-out infinite;
  }
  @keyframes skel-pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.45; }
  }
  .deps-error {
    color: var(--c-red);
    font-size: 0.85rem;
    padding: 6px 0;
  }

  #day-switcher, #line-switcher { font-size: 0.8rem; }
  #day-switcher span, #line-switcher span { transition: color 0.15s; }
  #day-switcher .active,   #line-switcher .active   { color: var(--c-navy); font-weight: 500; }
  #day-switcher .inactive, #line-switcher .inactive { color: var(--c-muted); font-weight: 400; }

  .line-pick-btns {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
  }
  .line-pick-btn {
    font-size: 1rem;
    font-weight: 500;
    color: #fff;
    background: var(--c-navy);
    border: none;
    border-radius: 12px;
    padding: 0.75rem 2rem;
    cursor: pointer;
  }

  #contact-link {
    position: relative;
    z-index: 30;
    font-size: 0.75rem;
    color: var(--c-muted);
    text-decoration: none;
    display: block;
    text-align: center;
    padding-top: 0.75rem;
    padding-bottom: 1rem;
  }
  #contact-link:hover { color: var(--c-navy); }

  </style>
</head>
<body>

  <div id="splash">
    <div id="splash-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg>
    </div>
    <div id="splash-title">Praamile</div>
    <div id="splash-line-pick">
      <div id="splash-desc">Vali saar</div>
      <div class="line-pick-btns">
        <button class="line-pick-btn" onclick="pickLine('saaremaa')">Saaremaa</button>
        <button class="line-pick-btn" onclick="pickLine('hiiumaa')">Hiiumaa</button>
      </div>
    </div>
    <div id="splash-loc" class="hidden" style="display:flex;flex-direction:column;align-items:center;gap:0">
      <div id="splash-desc" style="max-width:260px">Kasutan su asukohta, et arvutada teekonnaaeg sadamani.</div>
      <button id="start-btn" onclick="startApp()">Luba asukoht</button>
    </div>
  </div>
  <div id="status"></div>
  <div id="error" class="hidden"><span id="error-msg"></span></div>
  <div id="top-row" style="display:none;width:100%;max-width:480px;flex-direction:row;justify-content:space-between;align-items:center;margin-bottom:0.25rem">
    <div style="display:flex;align-items:center;gap:14px">
      <div id="line-switcher">
        <span id="line-saaremaa" onclick="setLine('saaremaa')" style="cursor:pointer">Saaremaa</span><span style="color:#c8d0dc;margin:0 7px;font-weight:300">|</span><span id="line-hiiumaa" onclick="setLine('hiiumaa')" style="cursor:pointer">Hiiumaa</span>
      </div>
      <div id="day-switcher">
        <span id="day-today" onclick="setDay('today')" style="cursor:pointer">Täna</span><span style="color:#c8d0dc;margin:0 7px;font-weight:300">|</span><span id="day-tomorrow" onclick="setDay('tomorrow')" style="cursor:pointer">Homme</span>
      </div>
    </div>
    <div id="location-row" class="location-row"></div>
  </div>
  <div id="results"></div>
  <div id="bottom-bar">
  <div id="controls" style="display:none">
    <button id="toggle-missed" class="toggle-btn" onclick="toggleMissed()"></button>
    <div class="buffer-row">
      <span class="buffer-row-label">Ajavaru sadamas:</span>
      <div class="buffer-opts">
        <input type="radio" name="buf" id="buf5" value="5" onchange="setBuffer(5)">
        <label for="buf5">5 min</label>
        <input type="radio" name="buf" id="buf10" value="10" onchange="setBuffer(10)">
        <label for="buf10">10 min</label>
        <input type="radio" name="buf" id="buf15" value="15" onchange="setBuffer(15)" checked>
        <label for="buf15">15 min</label>
        <input type="radio" name="buf" id="buf20" value="20" onchange="setBuffer(20)">
        <label for="buf20">20 min</label>
      </div>
    </div>
    <div class="buffer-row" style="gap:8px;display:none">
      <span class="buffer-row-label" style="font-size:0.6rem;color:#aaa">⚙ aeg</span>
      <input type="range" id="time-slider" min="-120" max="120" value="0" step="5" style="flex:1" oninput="setTimeOffset(this.valueAsNumber);document.getElementById('time-lbl').textContent=(this.valueAsNumber>0?'+':'')+this.valueAsNumber+'min'">
      <span id="time-lbl" style="font-size:0.65rem;color:#aaa;min-width:40px;text-align:right">0min</span>
    </div>
    <div class="buffer-row" style="gap:8px;display:none">
      <span class="buffer-row-label" style="font-size:0.6rem;color:#aaa">⚙ koht</span>
      <select id="loc-select" style="flex:1;font-size:0.65rem;color:#aaa;background:none;border:none;outline:none;font-family:inherit;cursor:pointer" onchange="setDebugLocation(this.selectedIndex)">
        <option>Päris asukoht</option>
        <option>Kuressaare</option>
      </select>
    </div>
  </div>
  </div>
  <a id="contact-link">Kontakt</a>

<script>
    const MAPBOX_TOKEN = 'pk.eyJ1IjoibXRpaXRzb24iLCJhIjoiY21uNmhjaTR6MDRqNTJzc2JuaGt3enE3MyJ9.5mExSmnjLhuwlGaC1ViDkg';
    const GMAPS_TOKEN  = 'AIzaSyAoJEMXdmKbLDDslv-ozaU3k7JmjpJHRmo';

    let _timeOffsetMs = 0;
    function now() { return new Date(Date.now() + _timeOffsetMs); }

    let _locationOverride = null;
    const DEBUG_LOCATIONS = [
      { label: 'Päris asukoht', coords: null },
      { label: 'Kuressaare',    coords: { latitude: 58.2481, longitude: 22.5134 } },
    ];
    function setDebugLocation(idx) {
      _locationOverride = DEBUG_LOCATIONS[idx].coords;
      _placeName = null;
      document.getElementById('location-row').innerHTML = '';
      run();
    }

    function updateDaySwitcher() {
      const todayEl    = document.getElementById('day-today');
      const tomorrowEl = document.getElementById('day-tomorrow');
      if (!todayEl) return;
      todayEl.className    = _selectedDay === 'today'    ? 'active' : 'inactive';
      tomorrowEl.className = _selectedDay === 'tomorrow' ? 'active' : 'inactive';
    }

    function setDay(day) {
      if (day === _selectedDay) return;
      _selectedDay = day;
      updateDaySwitcher();
      if (_cachedSelected) {
        if (_cachedDeps[day]) {
          render(_cachedSelected, _cachedDeps[day]);
        } else {
          refresh();
        }
      }
    }

    function updateLineSwitcher() {
      const saEl = document.getElementById('line-saaremaa');
      const hiEl = document.getElementById('line-hiiumaa');
      if (!saEl) return;
      saEl.className = _selectedLine === 'saaremaa' ? 'active' : 'inactive';
      hiEl.className = _selectedLine === 'hiiumaa'  ? 'active' : 'inactive';
    }

    function pickLine(line) {
      _selectedLine = line;
      localStorage.setItem('selectedLine', line);
      updateLineSwitcher();
      document.getElementById('splash-line-pick').classList.add('hidden');
      document.getElementById('splash-loc').classList.remove('hidden');
      if (localStorage.getItem('locationGranted')) startApp();
    }

    function setLine(line) {
      if (line === _selectedLine) return;
      _selectedLine = line;
      localStorage.setItem('selectedLine', line);
      updateLineSwitcher();
      _cachedSelected = null;
      _cachedDeps     = {};
      if (_refreshTimer)   { clearInterval(_refreshTimer);   _refreshTimer   = null; }
      if (_sideCheckTimer) { clearInterval(_sideCheckTimer); _sideCheckTimer = null; }
      if (_cachedCoords) runWithCoords(_cachedCoords.latitude, _cachedCoords.longitude);
    }

    function trackColorAt(pct, bufMins) {
      const win = 60;
      const p1 = (win - bufMins - 10) / win * 100;
      const p2 = (win - bufMins)      / win * 100;
      const p3 = (win - 5)            / win * 100;
      const grey   = [200, 208, 220];
      const green  = [22,  163, 74];
      const yellow = [202, 138, 4];
      const red    = [220, 38,  38];
      const lerp = (a, b, t) => a.map((v, i) => Math.round(v + (b[i] - v) * t));
      const rgb  = c => `rgb(${c.join(',')})`;
      const pmid = (p2 + p3) / 2;
      if (pct <= p1)   return rgb(lerp(grey,   green,  p1   === 0 ? 1 : pct / p1));
      if (pct <= p2)   return rgb(green);
      if (pct <= pmid) return rgb(lerp(green,  yellow, (pct - p2)   / (pmid - p2)));
      if (pct <= p3)   return rgb(lerp(yellow, red,    (pct - pmid) / (p3 - pmid)));
      return rgb(red);
    }

    function trackGradient(bufMins) {
      const win = 60;
      const p1   = ((win - bufMins - 10) / win * 100).toFixed(1); // grey → green
      const p2   = ((win - bufMins)      / win * 100).toFixed(1); // green holds here (target)
      const pmid = (((win - bufMins) + (win - 5)) / 2 / win * 100).toFixed(1); // green → yellow
      const p3   = ((win - 5)            / win * 100).toFixed(1); // yellow → red
      return `linear-gradient(to right, #c8d0dc 0%, var(--c-green) ${p1}%, var(--c-green) ${p2}%, var(--c-yellow) ${pmid}%, var(--c-red) ${p3}%)`;
    }
    function setTimeOffset(mins) {
      _timeOffsetMs = mins * 60 * 1000;
      if (_cachedSelected && _cachedDeps[_selectedDay]) render(_cachedSelected, _cachedDeps[_selectedDay]);
    }

    // ── Contact link (assembled in JS to avoid bot harvesting) ────────────────
    (function() {
      const addr = 'mattias' + '\u0040' + 'igak\u00fcla.ee';
      document.getElementById('contact-link').href = 'mailto:' + addr;
    })();

    // ── Buffer setting ────────────────────────────────────────────────────────
    let bufferMins = parseInt(localStorage.getItem('bufferMins') || '15', 10);

    function setBuffer(mins) {
      bufferMins = mins;
      localStorage.setItem('bufferMins', mins);
      if (_cachedSelected && _cachedDeps[_selectedDay]) render(_cachedSelected, _cachedDeps[_selectedDay]);
    }

    // ── Missed toggle ─────────────────────────────────────────────────────────
    let showMissed = localStorage.getItem('showMissed') === 'true';

    const CHECK_SVG = (checked) => `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="3"/>${checked ? '<path d="M7 12.5l3.5 3.5 6.5-7"/>' : ''}</svg>`;

    function updateToggleBtn() {
      const btn = document.getElementById('toggle-missed');
      btn.classList.toggle('active', showMissed);
      btn.innerHTML = CHECK_SVG(showMissed) + ' Näita praame, millele ei jõua';
    }

    function toggleMissed() {
      showMissed = !showMissed;
      localStorage.setItem('showMissed', showMissed);
      updateToggleBtn();
      if (_cachedSelected && _cachedDeps[_selectedDay]) render(_cachedSelected, _cachedDeps[_selectedDay]);
    }

    // ── Star state ────────────────────────────────────────────────────────────
    const ISLAND_PORTS = new Set(['kuivastu', 'heltermaa']);

    const TICKET_SVG = (color) => `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2M13 17v2M13 11v2"/></svg>`;

    function carAvailabilityColor(dep) {
      const sv = dep.capacities?.sv;
      if (sv === undefined || sv === null) return null;
      if (sv === 0)      return 'var(--c-muted)';
      if (sv <= 10)      return 'var(--c-yellow)';
      return 'var(--c-green)';
    }


    // ── Ports ─────────────────────────────────────────────────────────────────
    const ALL_PORTS = [
      { key: 'virtsu',    name: 'Virtsu sadam',    lon: 23.511273,  lat: 58.572837,  dir: 'VK' },
      { key: 'kuivastu',  name: 'Kuivastu sadam',  lon: 23.389240,  lat: 58.573006,  dir: 'KV' },
      { key: 'rohukyla',  name: 'Rohuküla sadam',  lon: 23.426702,  lat: 58.907544,  dir: 'RH' },
      { key: 'heltermaa', name: 'Heltermaa sadam', lon: 23.044376,  lat: 58.864811,  dir: 'HR' },
    ];

    function selectPorts(ports) {
      const get = key => ports.find(p => p.key === key);
      if (_selectedLine === 'hiiumaa') {
        const r = get('rohukyla'), h = get('heltermaa');
        const onIsland = h.driveSeconds !== null && (r.driveSeconds === null || h.driveSeconds < r.driveSeconds);
        return onIsland ? [h] : [r];
      } else {
        const v = get('virtsu'), k = get('kuivastu');
        const onIsland = k.driveSeconds !== null && (v.driveSeconds === null || k.driveSeconds < v.driveSeconds);
        return onIsland ? [k] : [v];
      }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function fmt(date) {
      return `${String(date.getHours()).padStart(2,'0')}.${String(date.getMinutes()).padStart(2,'0')}`;
    }
    function fmtDrive(sec) {
      if (sec === null) return '—';
      const m = Math.round(sec / 60);
      const h = Math.floor(m / 60);
      return h > 0 ? `${h}t ${m % 60}min` : `${m}min`;
    }

    // ── API calls ─────────────────────────────────────────────────────────────
    async function getDriveSeconds(userLon, userLat, port) {
      const resp = await fetch('https://routes.googleapis.com/directions/v2:computeRoutes', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Goog-Api-Key': GMAPS_TOKEN,
          'X-Goog-FieldMask': 'routes.legs.duration,routes.legs.staticDuration',
        },
        body: JSON.stringify({
          origin:      { location: { latLng: { latitude: userLat,  longitude: userLon  } } },
          destination: { location: { latLng: { latitude: port.lat, longitude: port.lon } } },
          travelMode:        'DRIVE',
          routingPreference: 'TRAFFIC_AWARE',
        }),
      });
      if (!resp.ok) {
        if (resp.status === 401 || resp.status === 403) throw new Error('Kaarditeenuse ligipääs keelatud. Ilma asukohata äpp ei tööta :(');
        if (resp.status === 429) throw new Error('Kaarditeenuse päringute limiit täis. Proovi hiljem.');
        throw new Error(`Kaarditeenuse viga (${resp.status}). Ilma asukohata äpp ei tööta :(`);
      }
      const data = await resp.json();
      const leg  = data.routes?.[0]?.legs?.[0];
      if (!leg) return null;
      return {
        duration:         leg.duration       ? parseInt(leg.duration)       : null,
        duration_typical: leg.staticDuration ? parseInt(leg.staticDuration) : null,
      };
    }

    async function getPlaceName(lon, lat) {
      const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${lon},${lat}.json`
        + `?types=place,locality&limit=1&access_token=${MAPBOX_TOKEN}`;
      try {
        const data = await fetch(url).then(r => r.json());
        return data.features?.[0]?.text ?? null;
      } catch { return null; }
    }

    async function getDepartures(dir, dateIso) {
      const url = `https://www.praamid.ee/online/events`
        + `?time-shift=300&departure-date=${dateIso}&direction=${dir}`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`Praamide ajakava laadimine ebaõnnestus (${resp.status}).`);
      const data = await resp.json();
      return data.items ?? [];
    }

    // ── Build one departure card ───────────────────────────────────────────────
    function buildCard(dep, driveSeconds, dir, isTomorrow = false, driveSecondsTypical = null) {
      const t        = now();
      const departAt = new Date(dep.dtstart);
      const driveMs  = driveSeconds * 1000;
      const bufMs    = bufferMins * 60 * 1000;

      const comfLeave = new Date(departAt - driveMs - bufMs);
      const critLeave = new Date(departAt - driveMs - bufMs / 2);
      const lastLeave = new Date(departAt - driveMs);
      const missed    = t > lastLeave;

      if (isTomorrow) {
        const typicalMs   = (driveSecondsTypical ?? driveSeconds) * 1000;
        const staticLeave = new Date(departAt - typicalMs - bufMs);
        const stardiLabel = fmt(staticLeave);
        const card = document.createElement('div');
        card.className = 'dep-card';
        card.innerHTML = `
          <div class="dep-strip grey"></div>
          <div class="dep-body">
            <div class="dep-mc-top">
              <div>
                <div class="micro-label">stardi</div>
                <div class="big-time" style="color:var(--c-green)">${stardiLabel}</div>
              </div>
              <div style="text-align:right">
                <div class="micro-label">praam</div>
                <div class="big-time" style="color:var(--c-navy)">${fmt(departAt)}</div>
              </div>
            </div>
          </div>
        `;
        return card;
      }

      // Urgency state
      let state, stripClass;
      if (missed) {
        state = 'grey'; stripClass = 'grey';
      } else if (t >= critLeave) {
        state = 'red'; stripClass = 'red';
      } else if (t >= comfLeave) {
        state = 'yellow'; stripClass = 'yellow';
      } else {
        state = 'green'; stripClass = 'green';
      }

      // Far-future: show countdown instead of track (>90 min until need to leave)
      const minsUntilLeave = (comfLeave - t) / 60000;
      const farFuture = !missed && minsUntilLeave > 90;

      // "stardi" (recommended leave time) — left column
      let stardiHtml;
      if (missed) {
        stardiHtml = '<div></div>';
      } else {
        let stardiText, stardiColor;
        if (state === 'red')    { stardiText = 'kohe!'; stardiColor = 'var(--c-red)'; }
        else if (state === 'yellow') { stardiText = 'kohe'; stardiColor = 'var(--c-yellow)'; }
        else                    { stardiText = fmt(comfLeave); stardiColor = 'var(--c-green)'; }
        stardiHtml = `<div>
          <div class="micro-label">stardi</div>
          <div class="big-time" style="color:${stardiColor}">${stardiText}</div>
        </div>`;
      }

      // "praam" (ferry departure) — right column
      const praamColor  = missed ? 'var(--c-muted)' : 'var(--c-navy)';
      const ticketColor = missed ? null : carAvailabilityColor(dep);
      const ticketUrl   = `https://www.praamid.ee/portal/ticket/departure?direction=${dir}`;
      const ticketHtml  = ticketColor ? `<a href="${ticketUrl}" target="_blank" rel="noopener" style="line-height:0;display:inline-flex">${TICKET_SVG(ticketColor)}</a>` : '';
      const praamHtml = `<div style="text-align:right">
        <div class="micro-label">praam</div>
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:5px">
          ${ticketHtml}
          <a href="${ticketUrl}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none"><div class="big-time" style="color:${praamColor}">${fmt(departAt)}</div></a>
        </div>
      </div>`;

      // Track or countdown
      let trackHtml;
      if (farFuture) {
        const totalMins = Math.floor((comfLeave - t) / 60000);
        const hours = Math.floor(totalMins / 60);
        const mins  = totalMins % 60;
        const hStr  = hours === 1 ? '1 tund'   : `${hours} tundi`;
        const mStr  = mins  === 1 ? '1 minut'  : `${mins} minutit`;
        const countdown = hours > 0 ? `${hStr} ${mStr} stardini` : `${mStr} stardini`;
        trackHtml = `<div class="dep-countdown">${countdown}</div>`;
      } else {
        // Pin position: for active ferries window ends at departure (t-60→t);
        // for missed ferries window starts at departure (t→t+60)
        const trackWindowMs     = 60 * 60 * 1000;
        const trackArrivalStart = missed
          ? departAt.getTime()
          : departAt.getTime() - trackWindowMs;
        const arrivalIfNow      = t.getTime() + driveMs;
        const pinPct            = Math.max(0, Math.min(100,
          (arrivalIfNow - trackArrivalStart) / trackWindowMs * 100
        ));

        const pinLabel = `kohal ${fmt(new Date(arrivalIfNow))}`;

        // Clamp label position so it stays within track bounds while staying centered
        const lblLeft = Math.max(10, Math.min(90, pinPct));
        const lblTransform = 'translateX(-50%)';

        const comfArrival = departAt.getTime() - bufMs;
        const flagPct     = Math.max(0, Math.min(100,
          (comfArrival - trackArrivalStart) / trackWindowMs * 100
        ));

        trackHtml = `
          <div class="micro-label" style="margin-bottom:6px">praegu startides: </div>
          <div class="dep-tw">
            <div class="dep-tr${missed ? ' missed' : ''}" style="${missed ? '' : `background:${trackGradient(bufferMins)}`}"></div>
            <div class="dep-caret${missed ? ' missed-edge' : ''}"></div>
            ${missed ? '' : `<div class="dep-flag" style="left:${flagPct}%"></div>`}
            <div class="dep-pin ${state}" style="left:${pinPct}%;${missed ? '' : `border-color:${trackColorAt(pinPct, bufferMins)};box-shadow:0 0 0 2px ${trackColorAt(pinPct, bufferMins).replace(')', ',.15)')},0 1px 4px rgba(0,0,0,.2)`}"></div>
            <div class="dep-pin-lbl ${state}" style="left:${lblLeft}%;transform:${lblTransform};${missed ? '' : `color:${trackColorAt(pinPct, bufferMins)}`}">${pinLabel}</div>
          </div>`;
      }

      const card = document.createElement('div');
      card.className = `dep-card${missed ? ' dep-missed' : ''}`;
      card.innerHTML = `
        <div class="dep-strip ${stripClass}"></div>
        <div class="dep-body">
          <div class="dep-mc-top">
            ${stardiHtml}
            ${praamHtml}
          </div>
          ${trackHtml}
        </div>
      `;
      return card;
    }

    // ── Build port section ────────────────────────────────────────────────────
    function buildPortSection(port, deps) {
      const section = document.createElement('div');
      section.className = 'port-section';
      section.dataset.key = port.key;

      const header = document.createElement('div');
      header.className = 'port-header';
      header.innerHTML = `
        <div class="port-name-wrap">
          <span class="port-name">${port.name}</span>
        </div>
        <span class="port-drive" title="Sõiduaeg varieerub päeva jooksul">${_selectedDay === 'tomorrow' ? '~' : ''}${fmtDrive(port.driveSeconds)} sõitu</span>
      `;
      section.appendChild(header);

      const scrollWrap = document.createElement('div');
      scrollWrap.className = 'deps-scroll-wrap';

      const depsEl = document.createElement('div');
      depsEl.className = 'departures expanded';

      if (deps === null) {
        for (let i = 0; i < 3; i++) {
          const skel = document.createElement('div');
          skel.className = 'dep-skeleton';
          depsEl.appendChild(skel);
        }
      } else if (deps.length === 0) {
        depsEl.innerHTML = '<div class="no-deps">Täna rohkem väljumisi pole</div>';
      } else {
        deps.forEach(dep => {
          if (port.driveSeconds !== null) {
            const isTomorrow = _selectedDay === 'tomorrow';
            if (isTomorrow && new Date(dep.dtstart).getHours() === 0) return;
            const card = buildCard(dep, port.driveSeconds, port.dir, isTomorrow, port.driveSecondsTypical);
            if (!isTomorrow && !showMissed && card.classList.contains('dep-missed')) return;
            depsEl.appendChild(card);
          }
        });
        if (depsEl.children.length === 0) {
          depsEl.innerHTML = '<div class="no-deps">Täna rohkem väljumisi pole</div>';
        }
      }

      const fadeTop = document.createElement('div');
      fadeTop.className = 'deps-fade-top';
      fadeTop.style.opacity = '0';

      const fadeBot = document.createElement('div');
      fadeBot.className = 'deps-fade-bot';
      fadeBot.style.opacity = '0';

      function updateFades() {
        const atTop = depsEl.scrollTop < 8;
        const atBot = depsEl.scrollTop + depsEl.clientHeight >= depsEl.scrollHeight - 8;
        fadeTop.style.opacity = atTop ? '0' : '1';
        fadeBot.style.opacity = atBot ? '0' : '1';
      }
      depsEl.addEventListener('scroll', updateFades);
      depsEl._updateFades = updateFades;

      scrollWrap.appendChild(depsEl);
      scrollWrap.appendChild(fadeTop);
      scrollWrap.appendChild(fadeBot);
      section.appendChild(scrollWrap);

      return section;
    }

    // Called synchronously after section is in the DOM to avoid a painted frame at scrollTop=0
    function initScroll(section, savedScrollTop) {
      const depsEl = section.querySelector('.departures');
      if (!depsEl) return;
      if (savedScrollTop !== undefined) {
        depsEl.scrollTop = savedScrollTop;
      } else {
        const cards = depsEl.querySelectorAll('.dep-card');
        let anchorIdx = -1;
        cards.forEach((card, i) => {
          if (anchorIdx === -1 && !card.classList.contains('dep-missed')) anchorIdx = i;
        });
        if (anchorIdx > 0) {
          depsEl.scrollTop = cards[anchorIdx - 1].offsetTop;
        } else if (anchorIdx === -1 && cards.length > 0) {
          depsEl.scrollTop = depsEl.scrollHeight;
        }
      }
      depsEl._updateFades?.();
    }

    function renderSkeletons(selected) {
      const results = document.getElementById('results');
      results.innerHTML = '';
      selected.forEach(port => results.appendChild(buildPortSection(port, null)));
    }

    function render(selected, departureMap, animate = false) {
      const sorted = [...selected];
      const results = document.getElementById('results');

      // Preserve scroll positions across re-renders
      const scrollPos = {};
      results.querySelectorAll('.port-section[data-key]').forEach(el => {
        const depsEl = el.querySelector('.departures');
        if (depsEl) scrollPos[el.dataset.key] = depsEl.scrollTop;
      });

      // FLIP: snapshot positions before re-render
      const before = {};
      if (animate) {
        results.querySelectorAll('.port-section[data-key]').forEach(el => {
          before[el.dataset.key] = el.getBoundingClientRect().top;
        });
      }

      results.innerHTML = '';
      const locRow = document.getElementById('location-row');
      if (_placeName) {
        locRow.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>${_placeName}`;
      }
      sorted.forEach((port) => {
        const section = buildPortSection(port, departureMap[port.dir] ?? []);
        results.appendChild(section);
        initScroll(section, scrollPos[port.key]);
      });

      // FLIP: animate from old positions to new
      if (animate) {
        results.querySelectorAll('.port-section[data-key]').forEach(el => {
          const delta = (before[el.dataset.key] ?? null) !== null
            ? before[el.dataset.key] - el.getBoundingClientRect().top
            : 0;
          if (delta !== 0) {
            el.style.transition = 'none';
            el.style.transform  = `translateY(${delta}px)`;
            requestAnimationFrame(() => requestAnimationFrame(() => {
              el.style.transition = 'transform 0.35s cubic-bezier(0.4, 0, 0.2, 1)';
              el.style.transform  = '';
            }));
          }
        });
      }
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function todayEET() {
      const parts = new Intl.DateTimeFormat('et-EE', {
        timeZone: 'Europe/Tallinn',
        year: 'numeric', month: '2-digit', day: '2-digit'
      }).formatToParts(new Date());
      const v = {};
      parts.forEach(p => v[p.type] = p.value);
      return `${v.year}-${v.month}-${v.day}`;
    }

    function setError(msg) {
      const errEl = document.getElementById('error');
      document.getElementById('error-msg').textContent = msg;
      errEl.classList.remove('hidden');
      if (!document.getElementById('retry-btn')) {
        const btn = document.createElement('button');
        btn.id = 'retry-btn';
        btn.textContent = 'Proovi uuesti';
        btn.onclick = run;
        errEl.appendChild(btn);
      }
    }

    function clearError() {
      document.getElementById('error').classList.add('hidden');
      document.getElementById('error-msg').textContent = '';
      const btn = document.getElementById('retry-btn');
      if (btn) btn.remove();
    }

    // ── Main fetch + render ───────────────────────────────────────────────────
    async function runWithCoords(latitude, longitude) {
      const status = document.getElementById('status');
      const statusTimer = setTimeout(() => { status.textContent = 'Arvutan teekonda...'; }, 150);

      if (!_placeName || (Date.now() - _placeNameFetchedAt) > 60 * 1000) {
        getPlaceName(longitude, latitude).then(name => {
          if (name) {
            _placeName = name;
            _placeNameFetchedAt = Date.now();
            const locRow = document.getElementById('location-row');
            locRow.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>${_placeName}`;
          }
        });
      }

      try {
        // ── Phase 1: drive times ──────────────────────────────────────────────
        const linePorts  = ALL_PORTS.filter(p =>
          _selectedLine === 'hiiumaa'
            ? (p.key === 'rohukyla' || p.key === 'heltermaa')
            : (p.key === 'virtsu'   || p.key === 'kuivastu')
        );
        const cacheMaxAge = 60 * 1000;
        const driveTimes = await Promise.all(linePorts.map(async p => {
          const cached = _driveCache[p.key];
          if (cached && (Date.now() - cached.fetchedAt) < cacheMaxAge) {
            return { duration: cached.duration, duration_typical: cached.duration_typical };
          }
          const result = await getDriveSeconds(longitude, latitude, p);
          if (result) _driveCache[p.key] = { ...result, fetchedAt: Date.now() };
          return result;
        }));
        const ports    = linePorts.map((p, i) => ({
          ...p,
          driveSeconds:        driveTimes[i]?.duration        ?? null,
          driveSecondsTypical: driveTimes[i]?.duration_typical ?? null,
        }));
        const selected = selectPorts(ports);
        _cachedSelected = selected;

        // Drive times known — clear status timer, show UI
        clearTimeout(statusTimer);
        status.textContent = '';
        document.getElementById('controls').style.display = '';
        document.getElementById('top-row').style.display = 'flex';
        const bufRadio = document.querySelector(`input[name="buf"][value="${bufferMins}"]`);
        if (bufRadio) bufRadio.checked = true;
        updateToggleBtn();
        updateDaySwitcher();
        updateLineSwitcher();

        // ── Phase 2: ferry departures ─────────────────────────────────────────
        const skeletonTimer = setTimeout(() => renderSkeletons(selected), 150);
        try {
          const dateIso   = _selectedDay === 'tomorrow' ? tomorrowEET() : todayEET();
          const depArrays = await Promise.all(selected.map(p => getDepartures(p.dir, dateIso)));
          clearTimeout(skeletonTimer);
          const depMap    = {};
          selected.forEach((p, i) => { depMap[p.dir] = depArrays[i]; });
          _cachedDeps[_selectedDay] = depMap;
          render(selected, depMap);
        } catch (e) {
          clearTimeout(skeletonTimer);
          renderSkeletons(selected);
          document.getElementById('results').querySelectorAll('.departures').forEach(el => {
            el.innerHTML = `<div class="deps-error">${e.message || 'Praamide ajakava laadimine ebaõnnestus.'}</div>`;
          });
        }

        _refreshTimer   = setInterval(refresh,    60 * 1000);
        _sideCheckTimer = setInterval(checkSide, 30 * 60 * 1000);

      } catch (e) {
        clearTimeout(statusTimer);
        setError(e.message || 'Midagi läks valesti. Proovi uuesti.');
        status.textContent = '';
      }
    }

    let _cachedSelected = null;
    let _cachedDeps     = {};
    let _driveCache     = {}; // { portKey: { duration, duration_typical, fetchedAt } }
    let _placeName      = null;
    let _placeNameFetchedAt = 0;
    let _cachedCoords   = null;
    let _refreshTimer   = null;
    let _sideCheckTimer = null;
    let _selectedDay    = 'today';
    let _selectedLine   = localStorage.getItem('selectedLine') || null;

    function tomorrowEET() {
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const parts = new Intl.DateTimeFormat('et-EE', {
        timeZone: 'Europe/Tallinn',
        year: 'numeric', month: '2-digit', day: '2-digit'
      }).formatToParts(tomorrow);
      const v = {};
      parts.forEach(p => v[p.type] = p.value);
      return `${v.year}-${v.month}-${v.day}`;
    }

    function tomorrowDepartAt() {
      return tomorrowEET() + 'T05:00';
    }

    async function refresh() {
      if (!_cachedSelected || !_cachedCoords) return;
      try {
        // Refresh drive time for selected port only
        for (const port of _cachedSelected) {
          const result = await getDriveSeconds(_cachedCoords.longitude, _cachedCoords.latitude, port);
          if (result) {
            _driveCache[port.key] = { ...result, fetchedAt: Date.now() };
            port.driveSeconds        = result.duration;
            port.driveSecondsTypical = result.duration_typical;
          }
        }
        // Refresh place name (respects its own 1-min cache)
        getPlaceName(_cachedCoords.longitude, _cachedCoords.latitude).then(name => {
          if (name && name !== _placeName) {
            _placeName = name;
            _placeNameFetchedAt = Date.now();
            const locRow = document.getElementById('location-row');
            if (locRow) locRow.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>${_placeName}`;
          }
        });
        // Refresh departures
        const dateIso   = _selectedDay === 'tomorrow' ? tomorrowEET() : todayEET();
        const depArrays = await Promise.all(_cachedSelected.map(p => getDepartures(p.dir, dateIso)));
        const depMap    = {};
        _cachedSelected.forEach((p, i) => { depMap[p.dir] = depArrays[i]; });
        _cachedDeps[_selectedDay] = depMap;
        render(_cachedSelected, depMap);
      } catch (_) { /* silent — show stale data rather than error on background refresh */ }
    }

    async function checkSide() {
      if (!_cachedCoords || !_cachedSelected) return;
      try {
        const linePorts = ALL_PORTS.filter(p =>
          _selectedLine === 'hiiumaa'
            ? (p.key === 'rohukyla' || p.key === 'heltermaa')
            : (p.key === 'virtsu'   || p.key === 'kuivastu')
        );
        const driveTimes = await Promise.all(
          linePorts.map(p => getDriveSeconds(_cachedCoords.longitude, _cachedCoords.latitude, p))
        );
        driveTimes.forEach((result, i) => {
          if (result) _driveCache[linePorts[i].key] = { ...result, fetchedAt: Date.now() };
        });
        const ports = linePorts.map((p, i) => ({
          ...p,
          driveSeconds:        driveTimes[i]?.duration        ?? null,
          driveSecondsTypical: driveTimes[i]?.duration_typical ?? null,
        }));
        const newSelected = selectPorts(ports);
        if (newSelected[0].key !== _cachedSelected[0].key) {
          _cachedSelected = newSelected;
          _cachedDeps     = {};
          refresh();
        }
      } catch (_) { /* silent */ }
    }

    async function run() {
      const status = document.getElementById('status');

      status.textContent = '';
      clearError();
      if (_refreshTimer) { clearInterval(_refreshTimer); _refreshTimer = null; }

      if (_locationOverride) {
        await runWithCoords(_locationOverride.latitude, _locationOverride.longitude);
        return;
      }

      if (!navigator.geolocation) {
        setError('Brauser ei toeta asukohateenust.');
        return;
      }

      status.textContent = 'Otsin su asukohta...';

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const { latitude, longitude } = pos.coords;
          _cachedCoords = { latitude, longitude };
          localStorage.setItem('locationGranted', '1');
          await runWithCoords(latitude, longitude);
        },
        (err) => {
          status.textContent = '';
          switch (err.code) {
            case err.PERMISSION_DENIED:    setError('Asukoha ligipääs keelatud.\n\nKontrolli brauseri ja seadme seadeid, et asukoht oleks lubatud.'); break;
            case err.POSITION_UNAVAILABLE: setError('Asukoht pole saadaval. Ilma asukohata äpp ei tööta :('); break;
            case err.TIMEOUT:              setError('Asukoha päring aegus. Ilma asukohata äpp ei tööta :('); break;
            default:                       setError('Tundmatu viga. Ilma asukohata äpp ei tööta :(');
          }
        },
        { timeout: 10000, maximumAge: 60000 }
      );
    }

    function startApp() {
      document.getElementById('splash').classList.add('hidden');
      run();
    }

    // Init splash state
    if (_selectedLine) {
      // Line already chosen — show location step or skip splash entirely
      document.getElementById('splash-line-pick').classList.add('hidden');
      document.getElementById('splash-loc').classList.remove('hidden');
      if (localStorage.getItem('locationGranted')) startApp();
    }
    // else: line picker is shown by default (splash-loc is hidden)
  </script>

</body>
</html>
